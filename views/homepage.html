<!DOCTYPE html>
<html lang="he">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>home page</title>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="homepage.css">
</head>

<body>

    <!-- NAVBAR -->
    <header class="navbar">

        <div class="right">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg"
                class="logo">

            <ul class="תפריט">
                <li>דף הבית</li>
                <li>סדרות</li>
                <li>סרטים</li>
                <li>משחקים</li>
                <li>חדשים ופופולריים</li>
                <li>הרשימה שלי</li>
                <li>דפדוף לפי שפות</li>
            </ul>
        </div>

        <div class="left">
            <i class="fa-solid fa-magnifying-glass icon"></i>

            <i class="fa-regular fa-bell icon bell"></i>

            <img src="images/ester.jpg" class="profile">
        </div>

    </header>

    <!-- BANNER -->
    <section class="banner">

        <div class="banner-content">

            <h1>Poker Night</h1>

            <p>
                The ultimate card game experience with exciting challenges.
            </p>

            <button class="play-btn">▶ Play</button>

            <button class="info-btn">More Info</button>

        </div>

    </section>

    <!-- SEARCH -->
    <input id="searchInput" placeholder="חיפוש בפיד..." />

    <!-- FEED -->
    <div id="feedContainer"></div>

    <button onclick="sortAZ()">מיון A-Z</button>

    <script src="script.js"></script>

</body>

</html>
